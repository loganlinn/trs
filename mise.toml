[env]
_.path = ["bin"]
HK_MISE = "1"

[tools]
hk = "latest"
pkl = "latest"
pinact = "latest"
shellcheck = "latest"
shfmt = "latest"
actionlint = "latest"
ripgrep = "latest"
rust = "latest"

[tasks.build]
run = "cargo build"

[tasks."build:release"]
run = "cargo build --release"

[tasks.test]
run = "cargo test"

[tasks.lint]
run = "cargo clippy -- -D warnings"

[tasks.fmt]
run = "cargo fmt"

[tasks.check]
run = "cargo check"

[tasks.run]
run = "cargo run --"

[tasks.bump]
description = "Bump version (prints new version)"
usage = '''
arg "<part>" help="Version part to bump" {
  choices "major" "minor" "patch"
}
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

part="${usage_part?}"
current=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
IFS='.' read -r major minor patch <<<"${current%%-*}"

case "$part" in
  major) major=$((major + 1)); minor=0; patch=0 ;;
  minor) minor=$((minor + 1)); patch=0 ;;
  patch) patch=$((patch + 1)) ;;
esac

echo "${major}.${minor}.${patch}"
'''

[tasks.release]
description = "Tag and push a release (triggers CI)"
usage = '''
arg "<part>" help="Version part to bump" {
  choices "major" "minor" "patch"
}
flag "--dry-run" help="Show what would happen without doing it"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

dry_run="${usage_dry_run:-false}"

# Ensure clean working tree
if [[ -n "$(git status --porcelain)" ]]; then
  echo >&2 "error: working tree is dirty"
  exit 1
fi

version="$(mise run bump "${usage_part?}")"
tag="v${version}"

# Ensure tag doesn't already exist
if git rev-parse "$tag" &>/dev/null; then
  echo >&2 "error: tag $tag already exists"
  exit 1
fi

# Update Cargo.toml version
current=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
sed -i'' -e "s/^version = \".*\"/version = \"$version\"/" Cargo.toml
cargo check --quiet 2>/dev/null || true  # update Cargo.lock
echo "Updated Cargo.toml: $current -> $version"

if [[ "$dry_run" == "true" ]]; then
  echo "[dry-run] would commit version bump, tag $tag, and push"
  git diff
  git checkout -- Cargo.toml Cargo.lock 2>/dev/null || true
  exit 0
fi

# Commit version bump if needed
if [[ -n "$(git status --porcelain)" ]]; then
  git add Cargo.toml Cargo.lock
  git commit -m "release: $tag"
fi

git tag -a "$tag" -m "$tag"
git push origin HEAD "$tag"
echo "Released $tag"
'''

[settings]
experimental = true
lockfile = true
