[env]
_.path = ["bin"]
HK_MISE = "1"

[tools]
hk = "latest"
pkl = "latest"
pinact = "latest"
shellcheck = "latest"
shfmt = "latest"
actionlint = "latest"
ripgrep = "latest"
rust = "latest"

[tasks.build]
run = "cargo build"

[tasks."build:release"]
run = "cargo build --release"

[tasks.test]
run = "cargo test"

[tasks.lint]
run = "cargo clippy -- -D warnings"

[tasks.fmt]
run = "cargo fmt"

[tasks.check]
run = "cargo check"

[tasks.run]
run = "cargo run --"

[settings]
experimental = true
lockfile = true
